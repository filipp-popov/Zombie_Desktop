    <script>
        deferredBootstrapper.bootstrap({
                  element: document.documentElement,
                  module: 'myApp',
                  bootstrapConfig: {
                      strictDi: true
                  },
                  resolve: {
                      config: [
                          '$http',function ($http) {
                              return $http.get('/config.json').then(function (result) {
                                  return result.data;
                              });
                          }
                      ],
                      localizations: [
                        '$http', '$q', function($http, $q) {
                          return $q.all(['ru', 'en', 'es'].map(function(lang) {
                            return $http.get('localization/localization.' + lang + '.json') 
                          })).then(function(results){
                            var localizations = {};
                            results.forEach(function(result) {
                              localizations[result.data.language] = result.data;
                            });
                            return localizations;
                          });
                        }
                      ]
                  }
              });
              

        $(document).keypress(function (e) {
            if ($(e.target).is('input, textarea')) {
                return;
            }
            e.preventDefault();
            e.cancelBubble = true;
            return false;
        });
        
        window.onpopstate = function (event) {
            history.go(1);
        };
    </script>
